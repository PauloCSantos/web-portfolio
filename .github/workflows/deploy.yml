name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: prod-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  TERRAFORM_VERSION: "1.15.7"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VAR_environment: prod
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
  TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}

jobs:
  plan:
    name: Terraform plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Validate deploy configuration
        env:
          AWS_PLAN_ROLE_ARN: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
          TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}
          TF_VAR_PROJECT_NAME: ${{ vars.TF_VAR_PROJECT_NAME }}
        run: |
          set -euo pipefail

          : "${AWS_PLAN_ROLE_ARN:?Missing GitHub secret AWS_PLAN_ROLE_ARN}"
          : "${AWS_REGION:?Missing GitHub Actions variable AWS_REGION}"
          : "${TF_STATE_BUCKET:?Missing GitHub Actions variable TF_STATE_BUCKET}"
          : "${TF_STATE_KEY:?Missing GitHub Actions variable TF_STATE_KEY}"
          : "${TF_STATE_REGION:?Missing GitHub Actions variable TF_STATE_REGION}"
          : "${TF_VAR_PROJECT_NAME:?Missing GitHub Actions variable TF_VAR_PROJECT_NAME}"

          if [[ ! "$AWS_PLAN_ROLE_ARN" =~ ^arn:aws:iam::[0-9]{12}:role/.+ ]]; then
            echo "AWS_PLAN_ROLE_ARN must be an IAM role ARN like arn:aws:iam::123456789012:role/github-actions-role" >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          mask-aws-account-id: true

      - name: Terraform init
        run: |
          terraform -chdir=infra/terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform plan
        run: terraform -chdir=infra/terraform plan -input=false -no-color -out=terraform.tfplan
        env:
          TF_VAR_project_name: ${{ vars.TF_VAR_PROJECT_NAME }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_site_bucket_name: ${{ vars.TF_VAR_SITE_BUCKET_NAME }}
          TF_VAR_enable_custom_domain: ${{ vars.TF_VAR_ENABLE_CUSTOM_DOMAIN || 'false' }}
          TF_VAR_domain_name: ${{ vars.TF_VAR_DOMAIN_NAME }}
          TF_VAR_enable_www_redirect: ${{ vars.TF_VAR_ENABLE_WWW_REDIRECT || 'true' }}
          TF_VAR_hosted_zone_id: ${{ vars.TF_VAR_HOSTED_ZONE_ID }}
          TF_VAR_create_acm_certificate: ${{ vars.TF_VAR_CREATE_ACM_CERTIFICATE || 'false' }}
          TF_VAR_acm_certificate_arn: ${{ secrets.TF_VAR_ACM_CERTIFICATE_ARN }}

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan
          path: infra/terraform/terraform.tfplan
          retention-days: 1

      - name: Summarize plan
        run: |
          {
            echo "## Terraform plan"
            echo
            echo "Plan created for prod. Apply requires approval in the production environment."
          } >> "$GITHUB_STEP_SUMMARY"

  apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: plan
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Validate deploy configuration
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
          TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}
          TF_VAR_PROJECT_NAME: ${{ vars.TF_VAR_PROJECT_NAME }}
        run: |
          set -euo pipefail

          : "${AWS_DEPLOY_ROLE_ARN:?Missing GitHub secret AWS_DEPLOY_ROLE_ARN}"
          : "${AWS_REGION:?Missing GitHub Actions variable AWS_REGION}"
          : "${TF_STATE_BUCKET:?Missing GitHub Actions variable TF_STATE_BUCKET}"
          : "${TF_STATE_KEY:?Missing GitHub Actions variable TF_STATE_KEY}"
          : "${TF_STATE_REGION:?Missing GitHub Actions variable TF_STATE_REGION}"
          : "${TF_VAR_PROJECT_NAME:?Missing GitHub Actions variable TF_VAR_PROJECT_NAME}"

          if [[ ! "$AWS_DEPLOY_ROLE_ARN" =~ ^arn:aws:iam::[0-9]{12}:role/.+ ]]; then
            echo "AWS_DEPLOY_ROLE_ARN must be an IAM role ARN like arn:aws:iam::123456789012:role/github-actions-role" >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          mask-aws-account-id: true

      - name: Terraform init
        run: |
          terraform -chdir=infra/terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Download Terraform plan
        uses: actions/download-artifact@v8
        with:
          name: terraform-plan
          path: infra/terraform

      - name: Terraform apply
        run: terraform -chdir=infra/terraform apply -input=false -auto-approve terraform.tfplan
        env:
          TF_VAR_project_name: ${{ vars.TF_VAR_PROJECT_NAME }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_site_bucket_name: ${{ vars.TF_VAR_SITE_BUCKET_NAME }}
          TF_VAR_enable_custom_domain: ${{ vars.TF_VAR_ENABLE_CUSTOM_DOMAIN || 'false' }}
          TF_VAR_domain_name: ${{ vars.TF_VAR_DOMAIN_NAME }}
          TF_VAR_enable_www_redirect: ${{ vars.TF_VAR_ENABLE_WWW_REDIRECT || 'true' }}
          TF_VAR_hosted_zone_id: ${{ vars.TF_VAR_HOSTED_ZONE_ID }}
          TF_VAR_create_acm_certificate: ${{ vars.TF_VAR_CREATE_ACM_CERTIFICATE || 'false' }}
          TF_VAR_acm_certificate_arn: ${{ secrets.TF_VAR_ACM_CERTIFICATE_ARN }}

      - name: Read Terraform outputs
        id: terraform_outputs
        run: |
          set -euo pipefail

          {
            echo "website_url=$(terraform -chdir=infra/terraform output -raw website_url)"
            echo "s3_bucket_name=$(terraform -chdir=infra/terraform output -raw s3_bucket_name)"
            echo "cloudfront_distribution_id=$(terraform -chdir=infra/terraform output -raw cloudfront_distribution_id)"
          } >> "$GITHUB_OUTPUT"

      - name: Build app with deployed URL
        run: npm run build
        env:
          VITE_PUBLIC_SITE_URL: ${{ steps.terraform_outputs.outputs.website_url }}

      - name: Upload immutable assets
        run: |
          aws s3 sync dist/ "s3://${{ steps.terraform_outputs.outputs.s3_bucket_name }}" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload app shell
        run: |
          aws s3 cp dist/index.html "s3://${{ steps.terraform_outputs.outputs.s3_bucket_name }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.terraform_outputs.outputs.cloudfront_distribution_id }}" \
            --paths "/*"
