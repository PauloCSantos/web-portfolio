name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  TERRAFORM_VERSION: "1.15.7"
  TF_IN_AUTOMATION: "true"

jobs:
  app:
    name: App quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build

      - name: Report outdated dependencies
        run: |
          set +e
          npm outdated > outdated.txt
          if [ -s outdated.txt ]; then
            {
              echo "## Outdated dependencies"
              echo
              echo '```'
              cat outdated.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Outdated dependencies" >> "$GITHUB_STEP_SUMMARY"
            echo "No outdated dependencies found." >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0

  terraform:
    name: Terraform validation
    runs-on: ubuntu-latest
    env:
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Terraform fmt
        run: terraform -chdir=infra/terraform fmt -check -recursive

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint init
        run: tflint --init
        working-directory: infra/terraform

      - name: TFLint
        run: tflint
        working-directory: infra/terraform

      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: infra/terraform
          exit-code: "1"
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore

      - name: Validate Terraform backend configuration
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          AWS_PLAN_ROLE_ARN: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
          TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}
          TF_VAR_PROJECT_NAME: ${{ vars.TF_VAR_PROJECT_NAME }}
        run: |
          set -euo pipefail

          : "${AWS_PLAN_ROLE_ARN:?Missing GitHub secret AWS_PLAN_ROLE_ARN}"
          : "${AWS_REGION:?Missing GitHub Actions variable AWS_REGION}"
          : "${TF_STATE_BUCKET:?Missing GitHub Actions variable TF_STATE_BUCKET}"
          : "${TF_STATE_KEY:?Missing GitHub Actions variable TF_STATE_KEY}"
          : "${TF_STATE_REGION:?Missing GitHub Actions variable TF_STATE_REGION}"
          : "${TF_VAR_PROJECT_NAME:?Missing GitHub Actions variable TF_VAR_PROJECT_NAME}"

          if [[ ! "$AWS_PLAN_ROLE_ARN" =~ ^arn:aws:iam::[0-9]{12}:role/.+ ]]; then
            echo "AWS_PLAN_ROLE_ARN must be an IAM role ARN like arn:aws:iam::123456789012:role/github-actions-role" >&2
            exit 1
          fi

      - name: Configure AWS credentials
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          mask-aws-account-id: true

      - name: Terraform init remote backend
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          terraform -chdir=infra/terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform validate
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: npm run infra:validate

      - name: Terraform plan
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          TF_VAR_project_name: ${{ vars.TF_VAR_PROJECT_NAME }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_site_bucket_name: ${{ vars.TF_VAR_SITE_BUCKET_NAME }}
          TF_VAR_enable_custom_domain: ${{ vars.TF_VAR_ENABLE_CUSTOM_DOMAIN || 'false' }}
          TF_VAR_domain_name: ${{ vars.TF_VAR_DOMAIN_NAME }}
          TF_VAR_hosted_zone_id: ${{ vars.TF_VAR_HOSTED_ZONE_ID }}
          TF_VAR_create_acm_certificate: ${{ vars.TF_VAR_CREATE_ACM_CERTIFICATE || 'false' }}
          TF_VAR_acm_certificate_arn: ${{ secrets.TF_VAR_ACM_CERTIFICATE_ARN }}
        run: |
          set +e
          terraform -chdir=infra/terraform plan -input=false -no-color -detailed-exitcode -out=terraform.tfplan > plan.txt
          status=$?
          set -e

          cat plan.txt

          {
            echo "## Terraform speculative plan"
            echo
            echo '```'
            sed -n '1,200p' plan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$status" -eq 1 ]; then
            exit 1
          fi
